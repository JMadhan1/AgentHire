{% extends "base.html" %}
{% block title %}404 — Page Not Found · AgentHire{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center text-center px-4" style="position:relative;overflow:hidden">
  <!-- Ambient -->
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:350px;background:radial-gradient(ellipse,rgba(239,68,68,0.06) 0%,transparent 65%);pointer-events:none"></div>

  <div class="anim-reveal">
    <div class="text-9xl font-black mb-2 leading-none"
         style="background:linear-gradient(135deg,#f1f5f9 0%,rgba(239,68,68,0.6) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">404</div>

    <div class="text-5xl mb-6" style="animation:float404 3s ease-in-out infinite">🔍</div>

    <h1 class="text-2xl font-bold text-white mb-3">Page Not Found</h1>
    <p class="text-slate-400 mb-8 max-w-sm mx-auto">The page you're looking for doesn't exist or has been moved.</p>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="{{ url_for('agent.index') }}" class="btn-grad px-8 py-3">← Go Home</a>
      <a href="{{ url_for('agent.dashboard') }}" class="btn-ghost px-8 py-3">📊 Dashboard</a>
    </div>
  </div>
</div>
<style>
@keyframes float404 { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-14px) rotate(5deg)} }
</style>
{% endblock %}
