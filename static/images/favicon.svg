<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0f0a1e"/>

  <!-- Outer hex / shield shape -->
  <path d="M32 6 L52 16 L52 36 Q52 50 32 58 Q12 50 12 36 L12 16 Z"
        fill="url(#g1)" opacity="0.9" filter="url(#glow)"/>

  <!-- Inner circuit "A" shape -->
  <path d="M32 18 L22 42 H26 L28.5 36 H35.5 L38 42 H42 L32 18Z
           M30 32 L32 26 L34 32 Z"
        fill="url(#g2)" fill-rule="evenodd"/>

  <!-- Two robot eyes / dots -->
  <circle cx="27" cy="46" r="2" fill="#e0e7ff" opacity="0.9"/>
  <circle cx="37" cy="46" r="2" fill="#e0e7ff" opacity="0.9"/>

  <!-- Subtle circuit line accents -->
  <line x1="22" y1="46" x2="25" y2="46" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <line x1="39" y1="46" x2="42" y2="46" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
</svg>
